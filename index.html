        function App() {
            const [token, setToken] = useState(null);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [detailMode, setDetailMode] = useState('overview');
            const [projects, setProjects] = useState([]);
            const [activeProject, setActiveProject] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [message, setMessage] = useState('');

            // 本地暫存紀錄表單是否填寫
            const [filledForms, setFilledForms] = useState(() => {
                const saved = localStorage.getItem('rd_pms_forms');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => {
                localStorage.setItem('rd_pms_forms', JSON.stringify(filledForms));
            }, [filledForms]);

            const showMsg = (msg) => {
                setMessage(msg);
                setTimeout(() => setMessage(''), 4000);
            };

            useEffect(() => {
                const initClient = () => {
                    if (window.google) {
                        window.tokenClient = window.google.accounts.oauth2.initTokenClient({
                            client_id: CLIENT_ID,
                            scope: SCOPES,
                            callback: (tokenResponse) => {
                                if (tokenResponse && tokenResponse.access_token) {
                                    setToken(tokenResponse.access_token);
                                    setUser({ name: '授權使用者', email: '已連線至 Google Cloud' });
                                }
                            },
                        });
                    }
                };
                setTimeout(initClient, 1000);
            }, []);

            const handleLogin = () => {
                if (window.tokenClient) window.tokenClient.requestAccessToken({ prompt: 'consent' });
                else showMsg('Google 登入模組尚未載入，請稍後重試');
            };

            const handleLogout = () => {
                setToken(null); setUser(null); setProjects([]); setView('dashboard');
                showMsg('已成功登出系統');
            };

            const fetchProjects = useCallback(async () => {
                if (!token) return;
                setIsLoading(true);
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:F`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    if (data.values && data.values.length > 1) {
                        const formatted = data.values.slice(1).map((row, index) => ({
                            rowIndex: index + 2,
                            id: row[0] || '無編號',
                            name: row[1] || '未命名',
                            requester: row[2] || '',
                            leader: row[3] || '待指派',
                            market: row[4] || '',
                            status: row[5] || PROJECT_STAGES[0]
                        }));
                        setProjects(formatted.reverse());
                    } else {
                        setProjects([]);
                    }
                } catch (err) {
                    showMsg('讀取失敗：' + err.message);
                } finally {
                    setIsLoading(false);
                }
            }, [token]);

            useEffect(() => { if (token) fetchProjects(); }, [token, fetchProjects]);

            const handleAddProject = async (newProj) => {
                setIsLoading(true);
                try {
                    const body = { values: [[newProj.id, newProj.name, newProj.requester, newProj.leader, newProj.market, newProj.status]] };
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A1:append?valueInputOption=USER_ENTERED`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    showMsg('成功建立新專案！');
                    setView('dashboard');
                    fetchProjects();
                } catch (err) { showMsg('寫入失敗：' + err.message); } 
                finally { setIsLoading(false); }
            };

            const handleUpdateStage = async (project, newStage) => {
                setIsLoading(true);
                try {
                    const range = `F${project.rowIndex}`;
                    const body = { values: [[newStage]] };
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`, {
                        method: 'PUT',
                        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    setActiveProject({ ...project, status: newStage });
                    showMsg(`專案已成功推進至：${newStage}`);
                    fetchProjects(); 
                } catch (err) { showMsg('狀態更新失敗：' + err.message); } 
                finally { setIsLoading(false); }
            };

            // 上傳文件至 Google Drive 的核心函數
            const handleUploadDrive = async (fileName, content, mimeType = 'text/plain') => {
                setIsLoading(true);
                try {
                    const metadata = { name: fileName, mimeType: mimeType };
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                    form.append('file', new Blob([content], { type: mimeType }));

                    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    showMsg(`生成的文件【${fileName}】已成功上傳至您的 Google Drive！`);
                    return true;
                } catch (err) { 
                    showMsg('文件上傳雲端失敗：' + err.message); 
                    return false;
                } finally { 
                    setIsLoading(false); 
                }
            };

            // 將表單資料轉換為 CSV，並上傳至 Google Drive
            const handleSaveForm = async (formKey, formData) => {
                const escapeCsv = (str) => `"${(str || '').toString().replace(/"/g, '""').replace(/\n/g, ' ')}"`;
                let csvContent = "";
                let fileName = "";
                
                if (formKey === 'form91') {
                    fileName = `${activeProject.id}_MZ-RD-04-91_粉材需求确认表.csv`;
                    csvContent = `粉材需求确认表\nNO:MZ-RD-04-91(A2)\n`;
                    csvContent += `需求单位,${escapeCsv(formData.dept)},需求人,${escapeCsv(formData.requester)}\n`;
                    csvContent += `应用机种/客户,${escapeCsv(formData.appMachine)},需求日期,${escapeCsv(formData.reqDate)}\n`;
                    csvContent += `应用方向,${escapeCsv(formData.appDirection)}\n\n`;
                    csvContent += `1、粉材特性需求\n*μr,*饱和需求 Idc(A),Drop%,H (Oe),耐压需求 最高电压（V）,最低阻抗（Ω）\n`;
                    csvContent += `${escapeCsv(formData.mu)},${escapeCsv(formData.idc)},${escapeCsv(formData.drop)},${escapeCsv(formData.h_oe)},${escapeCsv(formData.maxV)},${escapeCsv(formData.minOhm)}\n`;
                    csvContent += `*盐雾(h),*材料成本(元/kg),*耐温等级(℃),其他\n`;
                    csvContent += `${escapeCsv(formData.saltSpray)},${escapeCsv(formData.cost)},${escapeCsv(formData.tempClass)},${escapeCsv(formData.other)}\n\n`;
                    csvContent += `2、信赖性测试需求\n${escapeCsv(formData.reliability)}\n\n`;
                    csvContent += `签字\n需求人：,${escapeCsv(formData.signReq)},确认人：,${escapeCsv(formData.signConf)}\n`;
                } else if (formKey === 'form96') {
                    fileName = `${activeProject.id}_MZ-RD-04-96_可行性评估报告.csv`;
                    csvContent = `可行性评估报告\nNO:MZ-RD-04-96(A1)\n`;
                    csvContent += `主导部门：,${escapeCsv(formData.leadDept)},评估日期：,${escapeCsv(formData.evalDate)}\n`;
                    csvContent += `项目名称,${escapeCsv(formData.projName)},负责人,${escapeCsv(formData.leader)}\n`;
                    csvContent += `应用机种,${escapeCsv(formData.appMachine)},顾 客 名 称,${escapeCsv(formData.customer)}\n\n`;
                    csvContent += `一、粉材特性规格（磁环）：\nμr,饱和20% H(Oe）,饱和30% H(Oe）,绝缘 MΩ,绝缘 MΩ,时间 h,温度 ℃,成本 元/kg\n`;
                    csvContent += `${escapeCsv(formData.mu)},${escapeCsv(formData.h_20)},${escapeCsv(formData.h_30)},${escapeCsv(formData.ir1)},${escapeCsv(formData.ir2)},${escapeCsv(formData.h_time)},${escapeCsv(formData.temp)},${escapeCsv(formData.cost)}\n\n`;
                    csvContent += `二、材料需求（磁性粉末、胶水）\n类别,已有材料,说明,新开发材料,说明\n`;
                    csvContent += `粉材,${formData.mat_powder_old?'是':'否'},${escapeCsv(formData.mat_powder_desc)},${formData.mat_powder_new?'是':'否'},${escapeCsv(formData.mat_powder_desc)}\n`;
                    csvContent += `胶水,${formData.mat_glue_old?'是':'否'},${escapeCsv(formData.mat_glue_desc)},${formData.mat_glue_new?'是':'否'},${escapeCsv(formData.mat_glue_desc)}\n\n`;
                    csvContent += `三、产品生产工艺\n${escapeCsv(formData.process)}\n\n`;
                    csvContent += `四、信赖性测试标准\n${escapeCsv(formData.reliability)}\n\n`;
                    csvContent += `五、新产品开发进度评估\n开发目标阶段：\n`;
                    csvContent += `ES,${escapeCsv(formData.es_days)} 天,EVT,${escapeCsv(formData.evt_days)} 天,DVT,${escapeCsv(formData.dvt_days)} 天,PVT,${escapeCsv(formData.pvt_days)} 天\n\n`;
                    csvContent += `六、市场概况（企业性质、生产经营状况、近几年发展情况等）：\n${escapeCsv(formData.market)}\n\n`;
                    csvContent += `七、结论：\n${escapeCsv(formData.conclusion)}\n`;
                } else if (formKey === 'form95') {
                    fileName = `${activeProject.id}_MZ-RD-04-95_粉材初版规格书.csv`;
                    csvContent = `粉材初版规格书\nNO:MZ-RD-04-95(A1)\n\n一、磁环尺寸规格\n粉重(g),磁环外径(mm),磁环内径(mm)\n`;
                    csvContent += `${escapeCsv(formData.weight)},${escapeCsv(formData.outDia)},${escapeCsv(formData.inDia)}\n\n`;
                    csvContent += `二、磁环制作工艺\n压制工艺,压力(T),模具温度(℃),预热时间(sec),保压时间(sec)\n`;
                    csvContent += `${escapeCsv(formData.processType)},${escapeCsv(formData.pressure)},${escapeCsv(formData.moldTemp)},${escapeCsv(formData.preheatTime)},${escapeCsv(formData.holdTime)}\n\n`;
                    csvContent += `三、磁环特性规格\n导磁率(μ),30A（Drop%）,饱和20% H(Oe）,饱和30% H(Oe）,IR-50V(MΩ),IR-100V(MΩ),强度(N\\Mpa),盐雾等级\n`;
                    csvContent += `${escapeCsv(formData.mu)},${escapeCsv(formData.drop30a)},${escapeCsv(formData.h_20)},${escapeCsv(formData.h_30)},${escapeCsv(formData.ir50)},${escapeCsv(formData.ir100)},${escapeCsv(formData.strength)},${escapeCsv(formData.salt)}\n\n`;
                    csvContent += `四、信赖性测试标准\n${escapeCsv(formData.reliability)}\n\n`;
                    csvContent += `发布人,${escapeCsv(formData.publisher)},发布日期,${escapeCsv(formData.publishDate)}\n`;
                }

                // 加入 UTF-8 BOM，讓下載後的 Excel 能正確顯示中文
                const bom = "\uFEFF";
                
                // 呼叫上傳至 Google Drive API
                const uploadSuccess = await handleUploadDrive(fileName, bom + csvContent, 'text/csv');
                
                if (uploadSuccess) {
                    // 上傳成功才將勾選狀態寫入本地紀錄
                    setFilledForms(prev => ({
                        ...prev,
                        [activeProject.id]: {
                            ...(prev[activeProject.id] || {}),
                            [formKey]: formData
                        }
                    }));
                    setDetailMode('overview');
                }
            };

            if (!token) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100">
                        <div className="glass-card p-10 rounded-2xl shadow-xl w-full max-w-md text-center border border-slate-200">
                            <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-microchip text-3xl"></i></div>
                            <h1 className="text-2xl font-bold text-slate-800 mb-2">軟磁研發項目管理</h1>
                            <p className="text-slate-500 mb-8 text-sm">此系統已與 Google 雲端安全綁定<br/>請使用您的 Google 帳號授權登入</p>
                            <button onClick={handleLogin} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-3 shadow-md">
                                <i className="fa-brands fa-google"></i> 使用 Google 帳號登入
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    {/* 左側導覽 */}
                    <div className="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-2xl z-10 flex-shrink-0">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-500 rounded flex items-center justify-center text-white font-bold"><i className="fa-solid fa-atom"></i></div>
                            <h2 className="text-white font-bold text-lg tracking-wider">RD-PMS</h2>
                        </div>
                        <div className="flex-1 py-6 flex flex-col gap-2 px-4">
                            <button onClick={() => {setView('dashboard'); setDetailMode('overview');}} className={`flex items-center gap-3 w-full p-3 rounded-lg text-left transition ${view === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>
                                <i className="fa-solid fa-table-list w-5 text-center"></i> 項目總表
                            </button>
                            <button onClick={() => {setView('new'); setDetailMode('overview');}} className={`flex items-center gap-3 w-full p-3 rounded-lg text-left transition ${view === 'new' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>
                                <i className="fa-solid fa-plus w-5 text-center"></i> 新增需求
                            </button>
                        </div>
                        <div className="p-6 border-t border-slate-800 text-sm">
                            <button onClick={handleLogout} className="text-slate-400 hover:text-white transition flex items-center gap-2">
                                <i className="fa-solid fa-right-from-bracket"></i> 登出系統
                            </button>
                        </div>
                    </div>

                    {/* 右側內容 */}
                    <div className="flex-1 flex flex-col h-full relative overflow-hidden">
                        <header className="h-16 bg-white shadow-sm border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0">
                            <h1 className="text-xl font-bold text-slate-800">
                                {view === 'dashboard' ? '研發專案總覽' : view === 'new' ? '填寫新申請單' : '專案階段與詳細資訊'}
                            </h1>
                            {isLoading && <div className="text-blue-600 flex items-center gap-2 text-sm"><i className="fa-solid fa-circle-notch fa-spin"></i> 處理中...</div>}
                        </header>

                        <main className="flex-1 p-8 overflow-auto no-scrollbar">
                            {view === 'dashboard' && (
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <table className="w-full text-left border-collapse whitespace-nowrap">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                                                <th className="p-4 font-medium">專案編號</th>
                                                <th className="p-4 font-medium">專案名稱</th>
                                                <th className="p-4 font-medium">負責人</th>
                                                <th className="p-4 font-medium">目前階段</th>
                                                <th className="p-4 font-medium text-right">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {projects.map((p, i) => (
                                                <tr key={i} className="border-b border-slate-100 hover:bg-slate-50 transition">
                                                    <td className="p-4 text-slate-500 font-mono text-sm">{p.id}</td>
                                                    <td className="p-4 font-semibold text-slate-800">{p.name}</td>
                                                    <td className="p-4 text-slate-600">{p.leader}</td>
                                                    <td className="p-4">
                                                        <span className="px-2 py-1 border rounded text-xs font-medium bg-blue-100 text-blue-700 border-blue-200">{p.status}</span>
                                                    </td>
                                                    <td className="p-4 text-right">
                                                        <button onClick={() => { setActiveProject(p); setView('detail'); setDetailMode('overview'); }} className="text-blue-600 hover:bg-blue-50 px-3 py-1 rounded font-medium">
                                                            進入專案 <i className="fa-solid fa-chevron-right text-xs ml-1"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {projects.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">目前沒有資料，請新增您的第一筆專案</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {view === 'new' && (
                                <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                                    <form onSubmit={(e) => {
                                        e.preventDefault(); const fd = new FormData(e.target);
                                        handleAddProject({
                                            id: `RD-${Date.now().toString().slice(-6)}`, name: fd.get('name'), requester: fd.get('requester'),
                                            leader: '待指派', market: fd.get('market'), status: PROJECT_STAGES[0]
                                        });
                                    }}>
                                        <div className="mb-6"><label className="block text-sm font-medium text-slate-700 mb-2">專案/開發名稱 *</label><input required name="name" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                        <div className="grid grid-cols-2 gap-6 mb-8">
                                            <div><label className="block text-sm font-medium text-slate-700 mb-2">需求人/单位 *</label><input required name="requester" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                            <div><label className="block text-sm font-medium text-slate-700 mb-2">应用机种/客户</label><input name="market" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                        </div>
                                        <div className="flex justify-end gap-4">
                                            <button type="button" onClick={() => setView('dashboard')} className="px-6 py-2 border rounded-lg hover:bg-slate-50">取消</button>
                                            <button type="submit" disabled={isLoading} className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2"><i className="fa-solid fa-flag-checkered"></i> 建立專案立項</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {view === 'detail' && activeProject && (() => {
                                const currentStageIndex = PROJECT_STAGES.indexOf(activeProject.status);
                                const isFinished = currentStageIndex === PROJECT_STAGES.length - 1;
                                const isInitiation = currentStageIndex === 0;
                                
                                const projForms = filledForms[activeProject.id] || {};
                                const has91 = !!projForms.form91;
                                const has96 = !!projForms.form96;
                                const has95 = !!projForms.form95;
                                const canAdvanceInitiation = has91 && has96 && has95;

                                if (detailMode === 'form91') return <Form91 project={activeProject} initialData={projForms.form91} onSave={(d) => handleSaveForm('form91', d)} onCancel={() => setDetailMode('overview')} isLoading={isLoading} />;
                                if (detailMode === 'form96') return <Form96 project={activeProject} initialData={projForms.form96} onSave={(d) => handleSaveForm('form96', d)} onCancel={() => setDetailMode('overview')} isLoading={isLoading} />;
                                if (detailMode === 'form95') return <Form95 project={activeProject} initialData={projForms.form95} onSave={(d) => handleSaveForm('form95', d)} onCancel={() => setDetailMode('overview')} isLoading={isLoading} />;

                                return (
                                <div className="max-w-4xl mx-auto">
                                    <button onClick={() => setView('dashboard')} className="mb-6 text-slate-500 hover:text-slate-800 flex items-center gap-2 font-medium"><i className="fa-solid fa-arrow-left"></i> 返回總表</button>
                                    
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-8 mb-6">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h2 className="text-3xl font-bold text-slate-800 mb-2">{activeProject.name}</h2>
                                                <div className="flex items-center gap-3 text-sm text-slate-500">
                                                    <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">{activeProject.id}</span>
                                                    <span><i className="fa-regular fa-user mr-1"></i> {activeProject.leader}</span>
                                                </div>
                                            </div>
                                            <span className="px-4 py-2 bg-blue-100 text-blue-700 rounded-full font-bold border border-blue-200">
                                                {isFinished ? <><i className="fa-solid fa-check-double mr-2"></i>已結案</> : <><i className="fa-solid fa-spinner fa-spin-pulse mr-2"></i>進行中：{activeProject.status}</>}
                                            </span>
                                        </div>

                                        <div className="mt-10 mb-8 relative">
                                            <div className="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-slate-200 rounded-full z-0"></div>
                                            <div className="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-blue-500 rounded-full z-0 transition-all duration-500" style={{ width: `${currentStageIndex >= 0 ? (currentStageIndex / (PROJECT_STAGES.length - 1)) * 100 : 0}%` }}></div>
                                            <div className="relative z-10 flex justify-between">
                                                {PROJECT_STAGES.map((stage, idx) => {
                                                    let nodeColor = idx < currentStageIndex ? "bg-blue-500 border-blue-500 text-white" : idx === currentStageIndex ? "bg-white border-blue-500 text-blue-600 ring-4 ring-blue-100" : "bg-white border-slate-300 text-slate-400";
                                                    return (
                                                        <div key={stage} className="flex flex-col items-center w-16">
                                                            <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold transition-all ${nodeColor}`}>{idx < currentStageIndex ? <i className="fa-solid fa-check"></i> : idx + 1}</div>
                                                            <div className="mt-3 text-xs text-center whitespace-nowrap font-medium text-slate-600">{stage}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {isInitiation && (
                                            <div className="mt-8 bg-slate-50 p-6 rounded-xl border border-slate-200">
                                                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-list-check text-blue-600"></i> 階段任務：立項文件 Check List</h3>
                                                <p className="text-sm text-slate-500 mb-4">完成下方表單後，系統將自動生成檔案並上傳至您的 Google Drive。</p>
                                                
                                                <ul className="space-y-3">
                                                    <li className="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-lg">
                                                        <div className="flex items-center gap-3">
                                                            {has91 ? <i className="fa-solid fa-square-check text-green-500 text-xl"></i> : <i className="fa-regular fa-square text-slate-300 text-xl"></i>}
                                                            <span className={`font-medium ${has91 ? 'text-slate-500 line-through' : 'text-slate-700'}`}>MZ-RD-04-91 粉材需求确认表</span>
                                                        </div>
                                                        <button onClick={() => setDetailMode('form91')} className="px-4 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 font-medium rounded border border-blue-200 transition text-sm">
                                                            {has91 ? '重新編輯' : '點擊填寫'}
                                                        </button>
                                                    </li>
                                                    <li className="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-lg">
                                                        <div className="flex items-center gap-3">
                                                            {has96 ? <i className="fa-solid fa-square-check text-green-500 text-xl"></i> : <i className="fa-regular fa-square text-slate-300 text-xl"></i>}
                                                            <span className={`font-medium ${has96 ? 'text-slate-500 line-through' : 'text-slate-700'}`}>MZ-RD-04-96 可行性评估报告</span>
                                                        </div>
                                                        <button onClick={() => setDetailMode('form96')} className="px-4 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 font-medium rounded border border-blue-200 transition text-sm">
                                                            {has96 ? '重新編輯' : '點擊填寫'}
                                                        </button>
                                                    </li>
                                                    <li className="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-lg">
                                                        <div className="flex items-center gap-3">
                                                            {has95 ? <i className="fa-solid fa-square-check text-green-500 text-xl"></i> : <i className="fa-regular fa-square text-slate-300 text-xl"></i>}
                                                            <span className={`font-medium ${has95 ? 'text-slate-500 line-through' : 'text-slate-700'}`}>MZ-RD-04-95 粉材初版规格书</span>
                                                        </div>
                                                        <button onClick={() => setDetailMode('form95')} className="px-4 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 font-medium rounded border border-blue-200 transition text-sm">
                                                            {has95 ? '重新編輯' : '點擊填寫'}
                                                        </button>
                                                    </li>
                                                </ul>
                                            </div>
                                        )}

                                        <div className="flex justify-center mt-8 pt-6 border-t border-slate-100 flex-col items-center">
                                            {!isFinished && (
                                                <button 
                                                    onClick={() => handleUpdateStage(activeProject, PROJECT_STAGES[currentStageIndex + 1])}
                                                    disabled={isLoading || (isInitiation && !canAdvanceInitiation)}
                                                    className={`px-8 py-3 rounded-full shadow-lg transition-all font-medium flex items-center gap-2
                                                        ${isLoading || (isInitiation && !canAdvanceInitiation) 
                                                            ? 'bg-slate-200 text-slate-400 cursor-not-allowed' 
                                                            : 'bg-blue-600 hover:bg-blue-700 text-white hover:scale-105'}`}
                                                >
                                                    推進至下一個階段：{PROJECT_STAGES[currentStageIndex + 1]} <i className="fa-solid fa-arrow-right"></i>
                                                </button>
                                            )}
                                            {isInitiation && !canAdvanceInitiation && (
                                                <p className="text-red-500 text-xs mt-3"><i className="fa-solid fa-circle-exclamation"></i> 請先完成上方所有 Check List 表單並上傳至雲端，方可解鎖推進按鈕。</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                );
                            })()}
                        </main>

                        {message && (
                            <div className="absolute bottom-8 right-8 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 z-50">
                                <i className="fa-solid fa-circle-check text-green-400"></i> {message}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
